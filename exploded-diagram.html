<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exploded House Diagram</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      body {
        font-family: "Inter", "Segoe UI", sans-serif;
        color: #1f2933;
      }

      canvas {
        display: block;
      }

      .back-link,
      .controls {
        position: fixed;
        z-index: 20;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(14px);
      }

      .back-link {
        top: 18px;
        left: 18px;
        padding: 10px 14px;
        border-radius: 999px;
        color: #344150;
        text-decoration: none;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .controls {
        top: 18px;
        right: 18px;
        display: flex;
        gap: 10px;
        padding: 10px;
        border-radius: 18px;
      }

      .controls button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: #f4f5f7;
        color: #22303c;
        font: 600 11px/1 "Inter", "Segoe UI", sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 180ms ease, color 180ms ease, transform 180ms ease;
      }

      .controls button:hover {
        transform: translateY(-1px);
      }

      .controls button.is-active {
        background: #202630;
        color: #ffffff;
      }

      .detail-label {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        z-index: 20;
        color: rgba(31, 41, 51, 0.62);
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        pointer-events: none;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <a class="back-link" href="./house-detail.html">Back To House</a>
    <div class="controls">
      <button id="explode-button" class="is-active" type="button">Explode</button>
      <button id="reset-button" type="button">Reset</button>
    </div>
    <div class="detail-label">Architectural Exploded Diagram</div>
    <script type="module" src="./exploded-diagram.js"></script>
  </body>
</html>
