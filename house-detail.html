<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>House Detail View</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #08111f;
      }

      body {
        font-family: "Inter", "Segoe UI", sans-serif;
      }

      canvas {
        display: block;
      }

      .back-link {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 20;
        padding: 10px 14px;
        color: rgba(228, 241, 255, 0.92);
        text-decoration: none;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        background: rgba(9, 18, 32, 0.58);
        border: 1px solid rgba(128, 177, 232, 0.22);
        border-radius: 999px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 18px rgba(76, 148, 235, 0.12);
      }

      .detail-label {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        z-index: 20;
        color: rgba(168, 198, 230, 0.82);
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        pointer-events: none;
      }

      .mode-toggle {
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        color: rgba(228, 241, 255, 0.92);
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        background: rgba(9, 18, 32, 0.58);
        border: 1px solid rgba(128, 177, 232, 0.22);
        border-radius: 999px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 18px rgba(76, 148, 235, 0.12);
      }

      .mode-toggle button {
        appearance: none;
        border: 0;
        background: rgba(120, 170, 220, 0.18);
        color: inherit;
        border-radius: 999px;
        padding: 6px 10px;
        font: inherit;
        letter-spacing: inherit;
        text-transform: inherit;
        cursor: pointer;
      }

      .dg.ac {
        top: 50% !important;
        right: 18px !important;
        bottom: auto !important;
        transform: translateY(-50%);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
        }
      }
    </script>
  </head>
  <body class="house-detail-page">
    <div id="root"></div>
    <a class="back-link" href="./index.html">Back To City</a>
    <div class="mode-toggle">
      <span id="mode-label">Night</span>
      <button id="mode-button" type="button">Switch Mode</button>
    </div>
    <div class="detail-label">House Detail View</div>
    <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
    <script type="module" src="./house-detail.js"></script>
  </body>
</html>
