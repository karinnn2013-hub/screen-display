<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart City Interface</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #f0f0f0;
        overflow-x: hidden;
      }

      body {
        position: relative;
        min-height: 420vh;
      }

      #root {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
      }

      #scroll-section {
        height: 420vh;
        width: 100%;
      }

      #trigger-section {
        position: absolute;
        top: 258vh;
        left: 0;
        width: 100%;
        height: 90vh;
        pointer-events: none;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="scroll-section" aria-hidden="true"></div>
    <div id="trigger-section" aria-hidden="true"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
